r<!DOCTYPE html>

    <script>
    async function checkAuth() {
        try {
            const response = await fetch('/api/current-user');
            if (!response.ok) {
                // If the server returns 401 (Not logged in), redirect
                window.location.href = "login.html";
            }
        } catch (err) {
            window.location.href = "login.html";
        }
    }

    // Run this check immediately
    checkAuth();
</script>

 <script>
    let currentMainFilter = 'ALL';
    let currentSubFilter = null;

    function setFilter(filter) {
        currentMainFilter = filter;
        currentSubFilter = null;
        
        document.querySelectorAll('#mainFilters .filter-btn').forEach(btn => {
            btn.classList.replace('bg-slate-900', 'bg-white');
            btn.classList.replace('text-white', 'text-slate-600');
        });
        document.getElementById('btn-' + filter).classList.replace('bg-white', 'bg-slate-900');
        document.getElementById('btn-' + filter).classList.replace('text-slate-600', 'text-white');

        document.getElementById('onlineSubFilters').classList.toggle('hidden', filter !== 'ONLINE');
        
        updateStats();
    }

    function setSubFilter(sub) {
        currentSubFilter = sub;
        document.querySelectorAll('.sub-btn').forEach(btn => {
            btn.classList.remove('bg-slate-900', 'text-white');
            btn.classList.add('border-slate-300', 'text-slate-500');
        });
        document.getElementById('btn-' + sub).classList.add('bg-slate-900', 'text-white');
        
        updateStats();
    }
    async function openAddStaff(e) {
    e.preventDefault();

    try {
        const res = await fetch('/api/current-user');

        if (!res.ok) {
            window.location.href = "login.html";
            return;
        }

        const data = await res.json();

        if (data.role === 'admin') {
            window.location.href = "adduser.html";
        } else {
            alert("Access Denied: Admins only");
        }

    } catch (err) {
        window.location.href = "login.html";
    }
}
    async function updateStats() {
        try {
            const response = await fetch('/api/bills');
            const bills = await response.json();
            const now = new Date();
            
            const filteredBills = bills.filter(bill => {
                if (currentMainFilter === 'ALL') return true;
                if (currentMainFilter === 'OFFLINE') return bill.orderSource !== 'ONLINE';
                if (currentMainFilter === 'ONLINE') {
                    if (!currentSubFilter) return bill.orderSource === 'ONLINE';
                    return bill.customer === currentSubFilter;
                }
                return true;
            });

            let todaySales = 0;
            let monthSales = 0;
            let totalOrders = filteredBills.length;

            filteredBills.forEach(bill => {
                const billDate = new Date(bill.deliveryDate || bill.date);
                const amount = parseFloat(bill.total || 0);

                if (billDate.toDateString() === now.toDateString()) todaySales += amount;
                if (billDate.getMonth() === now.getMonth() && billDate.getFullYear() === now.getFullYear()) monthSales += amount;
            });

            document.getElementById('statToday').textContent = `₹${todaySales.toLocaleString()}`;
            document.getElementById('statOrders').textContent = totalOrders;
            document.getElementById('statMonth').textContent = `₹${monthSales.toLocaleString()}`;
            
        } catch (err) { 
            console.error("Error fetching stats:", err); 
        }
    }
     async function displayLoggedInUser() {
    try {
        const response = await fetch('/api/current-user', { credentials: 'include' });
        if (response.ok) {
            const data = await response.json();
            
            // 1. Update the UI Text
            document.getElementById('displayUsername').textContent = data.username;
            document.getElementById('displayRole').textContent = data.role ? data.role.toUpperCase() : 'USER';

            // 2. Identify the "Add User" Tile
            const addUserTile = document.querySelector('a[href="adduser.html"]');
            
            // 3. SECURE CHECK: Only "admin" (case insensitive) is allowed
            const userRole = (data.role || '').toLowerCase();

            if (userRole !== 'admin') {
                // Change the link to do nothing
                addUserTile.href = "javascript:void(0)"; 
                
                // Show the "No Access" message on click
                addUserTile.onclick = function(e) {
                    e.preventDefault();
                    alert("Access Denied: You have no access to staff management.");
                };
                
                // Visually indicate it is locked
                addUserTile.style.opacity = "0.4";
                addUserTile.style.filter = "grayscale(100%)";
                addUserTile.querySelector('span').textContent = "LOCKED";
                addUserTile.querySelector('h3').classList.add('text-slate-400');
            }
        }
    } catch (error) {
        console.error("Could not fetch user:", error);
    }
}
    async function logout() {
        try {
            const response = await fetch('/api/logout', { method: 'POST' });
            if (response.ok) {
                localStorage.removeItem("fruitz_session"); 
                window.location.href = "login.html";
            }
        } catch (error) {
            console.error("Logout failed:", error);
        }
    }

    async function displayLoggedInUser() {
    try {
        const response = await fetch('/api/current-user', { credentials: 'include' });
        if (response.ok) {
            const data = await response.json();
            document.getElementById('displayUsername').textContent = data.username;
            
            // Logic to display 'Admin' if the property is true
          document.getElementById('displayRole').textContent = 
    data.role ? data.role.toUpperCase() : 'USER';
        }
    } catch (error) {
        console.error("Could not fetch user:", error);
    }
}
    window.onload = () => { 
        displayLoggedInUser();
        updateStats();
    };
</script>
</body>
