<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Login | Fruit'z POS</title>
  <style>
    :root {
      --accent: #ff4d4d;
      --bg-gradient: linear-gradient(135deg, #f6f7f9 0%, #e9ecef 100%);
    }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg-gradient);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 16px; /* Added padding for mobile screen edges */
    }

    .login-card {
      background: #ffffff;
      padding: 32px; /* Adjusted padding for better mobile feel */
      width: 100%;
      max-width: 400px;
      border-radius: 2rem;
      box-shadow: 0 20px 40px rgba(0,0,0,0.08);
      text-align: center;
    }

    .logo-container { 
      margin-bottom: 24px; 
      display: flex;
      justify-content: center;
    }
    
    .logo-img {
      max-width: 100%; /* Ensures logo doesn't overflow */
      width: 180px;    /* Large size */
      height: auto;
    }

    h2 { 
      color: #1a1a1a; 
      font-size: 1.25rem; /* Smaller than logo */
      margin-bottom: 8px; 
      font-weight: 700;
    }
    
    p { color: #94a3b8; margin-bottom: 24px; font-size: 0.875rem; }

    .input-field {
      width: 100%;
      box-sizing: border-box; /* Crucial for padding alignment */
      padding: 14px 16px;
      margin-bottom: 12px;
      border: 2px solid #f1f5f9;
      border-radius: 12px;
      font-size: 15px;
      transition: all 0.3s ease;
    }

    .input-field:focus { 
      border-color: var(--accent); 
      outline: none; 
      background: #fff8f8;
    }

    .submit-btn {
      width: 100%;
      padding: 14px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 12px;
      font-weight: 700;
      font-size: 16px;
      cursor: pointer;
      margin-top: 8px;
    }
  </style>
</head>
<body>

  <div class="login-card">
    <div class="logo-container">
      <img src="logo.jpeg" alt="Fruit'z Logo" class="logo-img">
    </div>
    
    <h2>Welcome Back</h2>
    <p>Sign in to access your dashboard</p>
    
    <form id="loginForm">
      <input type="text" id="username" class="input-field" placeholder="Username" required />
      <input type="password" id="password" class="input-field" placeholder="Password" required />
      <button type="submit" class="submit-btn">Log In</button>
    </form>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;

      try {
        const response = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await response.json();
        if (data.success) {
          localStorage.setItem("fruitz_session", JSON.stringify({ loggedIn: true, user: username }));
          window.location.href = "homepage.html";
        } else {
          alert(data.message || "Invalid credentials");
        }
      } catch (error) {
        alert("Server connection error.");
      }
    });
  </script>
</body>
</html>
