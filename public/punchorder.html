<!DOCTYPE html>
<html lang="en">
<head>
    <script>
    async function checkAuth() {
        try {
            const response = await fetch('/api/current-user');
            if (!response.ok) {
                // If the server returns 401 (Not logged in), redirect
                window.location.href = "login.html";
            }
        } catch (err) {
            window.location.href = "login.html";
        }
    }

    // Run this check immediately
    checkAuth();
</script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fruit’z | Punch Online</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">
  <div class="w-full max-w-md bg-white p-6 sm:p-8 rounded-[2rem] shadow-lg border border-slate-100">
    <div class="mb-8 text-center">
        <h2 class="text-2xl font-black text-slate-800">Punch Online Order</h2>
        <p class="text-slate-400 text-sm mt-1">Record Zomato/Swiggy orders</p>
    </div>
    
    <div class="space-y-4">
        <div>
            <label class="text-[10px] font-bold text-slate-400 uppercase ml-1 mb-1 block">Bill ID</label>
            <input type="text" id="billNumber" readonly class="w-full p-4 bg-slate-100 rounded-2xl font-mono font-bold text-slate-600 outline-none">
        </div>
        
        <div>
            <label class="text-[10px] font-bold text-slate-400 uppercase ml-1 mb-1 block">Platform</label>
            <select id="orderSource" class="w-full p-4 border-2 border-slate-100 rounded-2xl bg-white focus:border-indigo-500 outline-none font-medium">
                <option value="Zomato">Zomato</option>
                <option value="Swiggy">Swiggy</option>
                <option value="Other">Other</option>
            </select>
        </div>
        
        <div>
            <label class="text-[10px] font-bold text-slate-400 uppercase ml-1 mb-1 block">Total Amount (₹)</label>
            <input type="number" id="totalAmount" class="w-full p-4 border-2 border-slate-100 rounded-2xl focus:border-indigo-500 outline-none font-bold text-lg" placeholder="0.00">
        </div>
        
        <button onclick="saveOnlineOrder()" class="w-full py-4 mt-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded-2xl font-black shadow-lg shadow-indigo-200 transition-all active:scale-95">
            SAVE ORDER
        </button>
    </div>
  </div>

  <script>
    async function fetchNewBillId() {
        try {
            const res = await fetch('/api/next-bill-id');
            const data = await res.json();
            document.getElementById('billNumber').value = data.billId;
        } catch(e) { console.error("ID fetch failed"); }
    }

    async function saveOnlineOrder() {
        const totalAmountInput = document.getElementById('totalAmount');
        const billId = document.getElementById('billNumber').value;
        const totalValue = parseFloat(totalAmountInput.value);
        
        if (isNaN(totalValue) || totalValue < 0) {
            alert("Please enter a valid amount.");
            return;
        }

       const orderData = {
    id: billId,
    subtotal: totalValue,     // required for table
    advance: totalValue,      // mark paid
    total: totalValue,                 // no balance
    customer: document.getElementById('orderSource').value,
    date: new Date(),
    items: [],
    orderSource: "ONLINE"
};
        const res = await fetch('/api/bills', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(orderData)
        });

        if (res.ok) {
            alert("Order Saved Successfully!");
            totalAmountInput.value = "";
            await fetchNewBillId();
        }
    }
    window.onload = fetchNewBillId;
  </script>
</body>
</html>
