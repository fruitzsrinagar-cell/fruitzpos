<!DOCTYPE html>
<html lang="en">
<head>
    <script>
    async function checkAuth() {
        try {
            const response = await fetch('/api/current-user');
            if (!response.ok) {
                // If the server returns 401 (Not logged in), redirect
                window.location.href = "login.html";
            }
        } catch (err) {
            window.location.href = "login.html";
        }
    }

    // Run this check immediately
    checkAuth();
</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fruit’z | Vibrant Dispatch</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f5f5f5; }
        .glass-modal { background: rgba(255, 255, 255, 0.98); }
        .card-shadow { box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05); }
    </style>
</head>
<body class="p-4 md:p-12 font-sans">
    
    <div class="max-w-5xl mx-auto">
        <button onclick="window.history.back()" class="flex items-center text-slate-500 hover:text-rose-600 transition-colors mb-6 font-bold uppercase tracking-widest text-[10px]">
            ← Go Back
        </button>

        <div class="mb-10">
            <h1 class="text-2xl font-extrabold text-slate-900 tracking-tighter">Today's orders</h1>
        </div>

        <div id="todayOrdersGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
    </div>

    <div id="orderModal" class="hidden fixed inset-0 flex items-center justify-center p-4 z-50">
        <div class="absolute inset-0 bg-slate-900/10 backdrop-blur-sm" onclick="closeModal()"></div>
        <div class="glass-modal relative w-full max-w-md rounded-3xl p-8 card-shadow border border-slate-200">
            <h2 id="modalCustomer" class="text-2xl font-black text-slate-900 mb-6"></h2>
            <div id="modalDetails" class="space-y-6"></div>
            <button onclick="closeModal()" class="mt-8 w-full py-3 bg-slate-900 text-white rounded-xl font-bold uppercase text-xs">Close</button>
        </div>
    </div>

    <script>
        let currentOrders = [];
        const colors = ['bg-rose-500', 'bg-blue-500', 'bg-emerald-500', 'bg-amber-500', 'bg-violet-500'];

        async function loadTodayOrders() {
            const container = document.getElementById('todayOrdersGrid');
            try {
                const response = await fetch('/api/bills');
                currentOrders = await response.json();
                const today = new Date().toDateString();
                
                container.innerHTML = currentOrders
                    .filter(o => o.deliveryDate && new Date(o.deliveryDate).toDateString() === today)
                    .map((order, index) => {
                        const color = colors[index % colors.length];
                        return `
                            <div onclick="openModal('${order.id}')" class="bg-white p-6 rounded-3xl card-shadow cursor-pointer border border-slate-200 hover:scale-[1.02] transition-all">
                                <div class="${color} h-2 w-20 rounded-full mb-4"></div>
                                <h3 class="font-black text-lg text-slate-900">${order.customer}</h3>
                                <p class="text-xs font-bold text-slate-400 uppercase tracking-wide">${order.phone || 'No Phone'}</p>
                                
                                <div class="mt-4 text-[10px] text-slate-500 font-medium italic border-b pb-2 mb-3">
                                    ${order.address || 'No Address'}
                                </div>
                                <div class="space-y-1">
                                    ${order.items.slice(0, 3).map(i => `
                                        <div class="flex justify-between text-[11px] font-bold text-slate-700">
                                            <span>${i.name}</span>
                                            <span class="text-rose-500">x${i.quantity}</span>
                                        </div>
                                    `).join('')}
                                    ${order.items.length > 3 ? '<div class="text-[10px] text-slate-400 italic">...and more</div>' : ''}
                                </div>
                            </div>
                        `;
                    }).join('');
            } catch (e) { console.error(e); }
        }

        // ... (openModal and closeModal functions stay the same)
        function openModal(id) {
            const order = currentOrders.find(o => o.id == id);
            document.getElementById('modalCustomer').innerText = order.customer;
            document.getElementById('modalDetails').innerHTML = `
                <div>
                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Phone</p>
                    <p class="text-sm font-black text-blue-600">${order.phone || 'N/A'}</p>
                </div>
                <div>
                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Address</p>
                    <p class="text-sm font-semibold text-slate-700">${order.address || 'Not provided'}</p>
                </div>
                <div class="space-y-2">
                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Order Items</p>
                    ${order.items.map(i => `
                        <div class="flex justify-between items-center bg-slate-50 p-3 rounded-2xl border-l-4 border-emerald-500">
                            <span class="text-xs font-bold text-slate-700">${i.name}</span>
                            <span class="text-xs font-black text-emerald-600">x${i.quantity}</span>
                        </div>
                    `).join('')}
                </div>
            `;
            document.getElementById('orderModal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('orderModal').classList.add('hidden');
        }

        window.addEventListener('DOMContentLoaded', loadTodayOrders);
    </script>
</body>
</html>
