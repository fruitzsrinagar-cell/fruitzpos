<!DOCTYPE html>
<html lang="en">
<head>
  <script>
    async function checkAuth() {
        try {
            const response = await fetch('/api/current-user');
            if (!response.ok) {
                window.location.href = "login.html";
            }
        } catch (err) {
            window.location.href = "login.html";
        }
    }
    checkAuth();
  </script>

  <meta charset="UTF-8" />
  <title>Fruit’z | Billing History</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <script src="https://cdn.tailwindcss.com"></script>

  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background-color: #ffffff;
    }

    @media print {
      .no-print {
        display: none !important;
      }

      #printArea {
        display: block !important;
      }
    }
  </style>
</head>

<body class="bg-white">

<div class="max-w-6xl mx-auto no-print px-4 py-6">

  <header class="flex items-center justify-between mb-6">

    <div class="flex items-center gap-4">
      <a href="homepage.html" class="text-slate-900">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M15 19l-7-7 7-7"></path>
        </svg>
      </a>

      <h1 class="text-xl font-bold text-slate-900">
        Billing Records
      </h1>
    </div>

    <!-- CUSTOM DATE -->
   <div class="flex items-center bg-white px-4 py-2 rounded-2xl border border-slate-200 shadow-sm gap-3">

    <svg class="w-4 h-4 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
        d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 00-2 2z">
      </path>
    </svg>

    <div class="flex flex-col leading-tight">
        <span class="text-[9px] font-black tracking-[2px] uppercase text-slate-400">
            Filter
        </span>

        <span id="dateLabel" class="text-xs font-bold text-slate-700">
            Custom Date
        </span>
    </div>

    <input
      type="date"
      id="dateFilter"
      onchange="handleDateChange(this)"
      class="bg-transparent outline-none text-xs text-slate-500 cursor-pointer"
    >
</div>

  </header>

  <div class="mb-6">

    <div class="relative mb-4">

      <span class="absolute inset-y-0 left-4 flex items-center text-slate-400">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
        </svg>
      </span>

      <input
        id="searchBills"
        type="text"
        placeholder="Search by ID or Customer..."
        oninput="loadSavedBills()"
        class="w-full p-4 pl-12 rounded-2xl bg-slate-50 border-none outline-none focus:ring-2 focus:ring-red-500 text-slate-600"
      >
    </div>

    <div class="flex items-center justify-between">

      <div class="flex items-center gap-2">
        <span class="text-slate-500 text-sm">
          Total Records:
        </span>

        <span id="billCount" class="text-red-600 font-bold text-sm">
          0
        </span>
      </div>

      <button
        onclick="clearFilters()"
        class="text-xs font-bold text-blue-500 uppercase hover:underline"
      >
        Clear Filters
      </button>

    </div>
  </div>

  <!-- MOBILE -->
  <div id="mobileListView" class="md:hidden space-y-1"></div>

  <!-- DESKTOP -->
  <div class="hidden md:block overflow-hidden bg-white rounded-2xl border border-slate-100 shadow-sm">

    <table class="w-full text-left">

      <thead class="bg-slate-50 text-slate-500 text-[11px] font-black uppercase tracking-widest">
        <tr>
          <th class="px-6 py-4">Bill Details</th>
          <th class="px-6 py-4">Customer</th>
          <th class="px-6 py-4">Date & Time</th>
          <th class="px-6 py-4 text-right">Amount</th>
          <th class="px-6 py-4 text-center">Actions</th>
        </tr>
      </thead>

      <tbody id="desktopTableBody"
        class="divide-y divide-slate-50 text-sm"></tbody>

    </table>
  </div>
</div>

<script>

let allBills = [];

const fmt = (n) =>
  parseFloat(n || 0).toLocaleString('en-IN', {
    minimumFractionDigits: 2
  });

function formatDisplayDate(dateString) {

    const date = new Date(dateString);

    const d = String(date.getDate()).padStart(2, '0');
    const m = String(date.getMonth() + 1).padStart(2, '0');
    const y = date.getFullYear();

    const time = date.toLocaleTimeString('en-IN', {
      hour: 'numeric',
      minute: '2-digit',
      hour12: true
    }).toLowerCase();

    return `${d}-${m}-${y} • ${time}`;
}

function getDayLabel(dateString) {

    const date = new Date(dateString);

    const today = new Date();

    const yesterday = new Date();
    yesterday.setDate(today.getDate() - 1);

    if (date.toDateString() === today.toDateString())
      return "TODAY";

    if (date.toDateString() === yesterday.toDateString())
      return "YESTERDAY";

    return date.toLocaleDateString('en-GB', {
      day: '2-digit',
      month: 'long',
      year: 'numeric'
    }).toUpperCase();
}

function handleDateChange(input) {

    if (input.value) {

        const parts = input.value.split('-');

        document.getElementById('dateLabel').innerText =
          `${parts[2]}-${parts[1]}-${parts[0]}`;

    } else {

        document.getElementById('dateLabel').innerText =
          "Custom Date";
    }

    loadSavedBills();
}

function clearFilters() {

    document.getElementById('searchBills').value = '';

    document.getElementById('dateFilter').value = '';

    document.getElementById('dateLabel').innerText =
      "Custom Date";

    loadSavedBills();
}

async function loadSavedBills() {

  const mobileCont =
    document.getElementById('mobileListView');

  const desktopCont =
    document.getElementById('desktopTableBody');

  const search =
    document.getElementById('searchBills')
    .value.toLowerCase();

  const dateFilterValue =
    document.getElementById('dateFilter').value;

  try {

    const res = await fetch('/api/bills');

    allBills = await res.json();

    const sorted = allBills.sort(
      (a, b) => new Date(b.date) - new Date(a.date)
    );

    const filtered = sorted.filter(b => {

      const matchesSearch =
        String(b.id).toLowerCase().includes(search) ||
        (b.customer || "")
        .toLowerCase()
        .includes(search);

      let matchesDate = true;

      if (dateFilterValue) {

          const bill = new Date(b.date);

          const year = bill.getFullYear();

          const month =
            String(bill.getMonth() + 1)
            .padStart(2, '0');

          const day =
            String(bill.getDate())
            .padStart(2, '0');

          const billDate =
            `${year}-${month}-${day}`;

          matchesDate =
            billDate === dateFilterValue;
      }

      return matchesSearch && matchesDate;
    });

    document.getElementById('billCount').textContent =
      filtered.length;

    mobileCont.innerHTML = '';

    desktopCont.innerHTML = '';

    let lastLabel = "";

    filtered.forEach(b => {

      const customerName =
        (b.customer || "Walk-in");

      const displayDate =
        formatDisplayDate(b.date);

      const dayLabel =
        getDayLabel(b.date);

      const amount =
        fmt(b.total);

      if (dayLabel !== lastLabel) {

          mobileCont.innerHTML += `
            <div class="bg-slate-50 px-4 py-2 text-[10px] font-black text-slate-400 tracking-widest mt-4 first:mt-0">
              ${dayLabel}
            </div>`;

          lastLabel = dayLabel;
      }

      let icon = `
        <div class="w-10 h-10 rounded-xl bg-blue-50 flex items-center justify-center text-blue-500">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z">
            </path>
          </svg>
        </div>`;

      if(customerName.toLowerCase().includes("zomato")) {

        icon = `
          <div class="w-10 h-10 rounded-xl bg-green-50 flex items-center justify-center">
            <img src="https://upload.wikimedia.org/wikipedia/commons/7/75/Zomato_logo.png"
              class="w-6 grayscale opacity-60">
          </div>`;
      }

      else if(customerName.toLowerCase().includes("swiggy")) {

        icon = `
          <div class="w-10 h-10 rounded-xl bg-orange-50 flex items-center justify-center text-orange-500 font-bold italic text-xs">
            S
          </div>`;
      }

      mobileCont.innerHTML += `
        <div onclick="window.location.href='viewdetailedbill.html?id=${b.id}'"
          class="flex items-center justify-between p-4 bg-white border-b border-slate-50 active:bg-slate-50 transition cursor-pointer">

          <div class="flex items-center gap-4">

            ${icon}

            <div>
              <div class="font-bold text-slate-900">
                ${customerName}
              </div>

              <div class="text-[10px] text-slate-400 font-medium uppercase">
                #${b.id}
              </div>
            </div>

          </div>

          <div class="text-right flex items-center gap-2">

            <div>
              <div class="font-bold text-green-600">
                ₹${amount}
              </div>

              <div class="text-[10px] text-slate-400">
                ${displayDate}
              </div>
            </div>

            <svg class="w-4 h-4 text-slate-300"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24">

              <path stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M9 5l7 7-7 7">
              </path>
            </svg>

          </div>
        </div>`;

      desktopCont.innerHTML += `
        <tr class="hover:bg-slate-50 transition">

          <td class="px-6 py-4 font-black text-blue-500 text-xs uppercase">
            #${b.id}
          </td>

          <td class="px-6 py-4 font-bold text-slate-900 uppercase">
            ${customerName}
          </td>

          <td class="px-6 py-4 text-slate-500 text-xs">
            ${displayDate}
          </td>

          <td class="px-6 py-4 text-right font-black text-slate-900">
            ₹${amount}
          </td>

          <td class="px-6 py-4 text-center">

            <button
              onclick="window.location.href='viewdetailedbill.html?id=${b.id}'"
              class="p-2 text-slate-400 hover:text-blue-600">

              <svg class="w-5 h-5"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24">

                <path stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M15 12a3 3 0 11-6 0 3 3 0 016 0z">
                </path>

                <path stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z">
                </path>

              </svg>
            </button>

          </td>
        </tr>`;
    });

  } catch(e) {

    console.error(e);
  }
}

loadSavedBills();

</script>

</body>
</html>
