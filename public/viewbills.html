<!DOCTYPE html>
<html lang="en">
<head>
  <script>
    async function checkAuth() {
        try {
            const response = await fetch('/api/current-user');
            if (!response.ok) {
                window.location.href = "login.html";
            }
        } catch (err) {
            window.location.href = "login.html";
        }
    }
    checkAuth();
  </script>
  <meta charset="UTF-8" />
  <title>Fruit’z | Billing History</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #ffffff; }
    @media print { .no-print { display: none !important; } #printArea { display: block !important; } }
    .custom-scrollbar::-webkit-scrollbar { width: 6px; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 10px; }
  </style>
</head>
<body class="bg-white">

<div class="max-w-6xl mx-auto no-print px-4 py-6">
  
  <header class="flex items-center justify-between mb-6">
    <div class="flex items-center gap-4">
      <a href="homepage.html" class="text-slate-900">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
      </a>
      <h1 class="text-xl font-bold text-slate-900">Billing Records</h1>
    </div>
    <button class="text-slate-900">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4"></path></svg>
    </button>
  </header>

  <div class="mb-6">
    <div class="relative mb-4">
      <span class="absolute inset-y-0 left-4 flex items-center text-slate-400">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
      </span>
      <input id="searchBills" type="text" placeholder="Search by ID or Customer..." oninput="loadSavedBills()" 
             class="w-full p-4 pl-12 rounded-2xl bg-slate-50 border-none outline-none focus:ring-2 focus:ring-green-500 text-slate-600">
    </div>
    <div class="flex items-center gap-2">
      <span class="text-slate-500 text-sm">Total Records:</span>
      <span id="billCount" class="text-green-600 font-bold text-sm">0</span>
    </div>
  </div>

  <div id="mobileListView" class="md:hidden space-y-1">
    </div>

  <div class="hidden md:block overflow-hidden bg-white rounded-2xl border border-slate-100 shadow-sm">
    <table class="w-full text-left">
      <thead class="bg-slate-50 text-slate-500 text-[11px] font-black uppercase tracking-widest">
        <tr>
          <th class="px-6 py-4">Bill Details</th>
          <th class="px-6 py-4">Customer</th>
          <th class="px-6 py-4">Date & Time</th>
          <th class="px-6 py-4 text-right">Amount</th>
          <th class="px-6 py-4 text-center">Actions</th>
        </tr>
      </thead>
      <tbody id="desktopTableBody" class="divide-y divide-slate-50 text-sm">
        </tbody>
    </table>
  </div>
</div>

<div id="detailsModal" class="fixed inset-0 z-50 hidden flex items-center justify-center p-4 bg-slate-900/40 backdrop-blur-sm">
  <div id="modalContent" class="bg-white w-full max-w-lg rounded-3xl p-6 shadow-2xl"></div>
</div>

<div id="printArea" class="hidden text-[10px] font-mono text-black p-4">
    <div class="text-center font-bold text-lg mb-2">FRUIT’Z</div>
    <div id="pBillNo" class="border-b mb-1"></div>
    <div id="pDate" class="border-b mb-1"></div>
    <div id="pCustomer" class="border-b mb-4 uppercase"></div>
    <div id="pItems" class="mb-4"></div>
    <div class="border-t pt-2 font-bold text-base flex justify-between"><span>TOTAL</span><span>₹<span id="pTotal"></span></span></div>
</div>

<script>
let allBills = [];
const fmt = (n) => parseFloat(n || 0).toLocaleString('en-IN', { minimumFractionDigits: 2 });

// Fixed DD-MM-YYYY format with time for the UI
function formatDisplayDate(dateString) {
    const date = new Date(dateString);
    const d = String(date.getDate()).padStart(2, '0');
    const m = String(date.getMonth() + 1).padStart(2, '0');
    const y = date.getFullYear();
    const time = date.toLocaleTimeString('en-IN', { hour: 'numeric', minute: '2-digit', hour12: true }).toLowerCase();
    return `${d}-${m}-${y} • ${time}`;
}

async function loadSavedBills() {
  const mobileCont = document.getElementById('mobileListView');
  const desktopCont = document.getElementById('desktopTableBody');
  const search = document.getElementById('searchBills').value.toLowerCase();

  try {
    const res = await fetch('/api/bills'); // Assuming your backend endpoint
    allBills = await res.json();
    
    const filtered = allBills.filter(b => 
      String(b.id).toLowerCase().includes(search) || 
      (b.customer || "").toLowerCase().includes(search)
    );

    document.getElementById('billCount').textContent = filtered.length;
    mobileCont.innerHTML = '';
    desktopCont.innerHTML = '';

    filtered.slice().reverse().forEach(b => {
      const customerName = (b.customer || "Walk-in");
      const displayDate = formatDisplayDate(b.date);
      const amount = fmt(b.total);
      
      // Determine Icons for Mobile View based on source
      let icon = `<div class="w-10 h-10 rounded-xl bg-blue-50 flex items-center justify-center text-blue-500">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                  </div>`;
      if(customerName.toLowerCase().includes("zomato")) {
          icon = `<div class="w-10 h-10 rounded-xl bg-green-50 flex items-center justify-center"><img src="https://upload.wikimedia.org/wikipedia/commons/7/75/Zomato_logo.png" class="w-6 grayscale opacity-60"></div>`;
      } else if(customerName.toLowerCase().includes("swiggy")) {
          icon = `<div class="w-10 h-10 rounded-xl bg-orange-50 flex items-center justify-center text-orange-500 font-bold italic text-xs">S</div>`;
      }

      // Render Mobile Item
      mobileCont.innerHTML += `
        <div onclick="viewBillDetails('${b.id}')" class="flex items-center justify-between p-4 bg-white border-b border-slate-50 active:bg-slate-50 transition">
          <div class="flex items-center gap-4">
            ${icon}
            <div>
              <div class="font-bold text-slate-900">${customerName}</div>
              <div class="text-[10px] text-slate-400 font-medium tracking-tight uppercase">#${b.id}</div>
            </div>
          </div>
          <div class="text-right flex items-center gap-2">
            <div>
                <div class="font-bold text-green-600">₹${amount}</div>
                <div class="text-[10px] text-slate-400">${displayDate}</div>
            </div>
            <svg class="w-4 h-4 text-slate-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
          </div>
        </div>`;

      // Render Desktop Row
      desktopCont.innerHTML += `
        <tr class="hover:bg-slate-50 transition">
          <td class="px-6 py-4 font-black text-blue-500 text-xs uppercase">#${b.id}</td>
          <td class="px-6 py-4 font-bold text-slate-900 uppercase">${customerName}</td>
          <td class="px-6 py-4 text-slate-500 text-xs">${displayDate}</td>
          <td class="px-6 py-4 text-right font-black text-slate-900">₹${amount}</td>
          <td class="px-6 py-4">
            <div class="flex justify-center gap-2">
              <button onclick="viewBillDetails('${b.id}')" class="p-2 text-slate-400 hover:text-blue-600 transition"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg></button>
              <button onclick="printSpecificBill('${b.id}')" class="p-2 text-slate-400 hover:text-green-600 transition"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"/></svg></button>
            </div>
          </td>
        </tr>`;
    });
  } catch(e) { console.error(e); }
}

function viewBillDetails(id) {
  // Redirects to the detailed page with the Bill ID in the URL
  window.location.href = `viewdetailedbill.html?id=${id}`;
}

function printSpecificBill(id) {
  const b = allBills.find(x => String(x.id) === String(id));
  document.getElementById('pBillNo').innerText = "BILL: " + b.id;
  document.getElementById('pDate').innerText = "DATE: " + formatDisplayDate(b.date);
  document.getElementById('pCustomer').innerText = "CUST: " + (b.customer || "CASH");
  document.getElementById('pTotal').innerText = fmt(b.total);
  document.getElementById('pItems').innerHTML = b.items.map(i => `<div class="flex justify-between"><span>${i.name} x${i.qty}</span><span>₹${fmt(i.price*i.qty)}</span></div>`).join('');
  window.print();
}

function closeModal() { document.getElementById('detailsModal').classList.add('hidden'); }
loadSavedBills();
</script>
</body>
</html>
