<!DOCTYPE html>
<html lang="en">
<head>
  <script>
    async function checkAuth() {
        try {
            const response = await fetch('/api/current-user');
            if (!response.ok) window.location.href = "login.html";
        } catch (err) { window.location.href = "login.html"; }
    }
    checkAuth();
  </script>
  <meta charset="UTF-8" />
  <title>Fruit’z | Billing History</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #ffffff; -webkit-tap-highlight-color: transparent; }
    .filter-chip { transition: all 0.2s ease; border: 1px solid #f1f5f9; cursor: pointer; }
    .filter-chip.active { background-color: #ef4444; color: white; border-color: #ef4444; box-shadow: 0 4px 12px rgba(239, 68, 68, 0.2); }
    .date-separator { background-color: #f8fafc; color: #94a3b8; font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.05em; padding: 12px 20px; border-top: 1px solid #f1f5f9; border-bottom: 1px solid #f1f5f9; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    @media print { .no-print { display: none !important; } }
  </style>
</head>
<body class="bg-white">

<div class="max-w-6xl mx-auto no-print pb-24">
  
  <header class="flex items-center justify-between p-6 md:px-0">
    <div class="flex items-center gap-4">
        <a href="homepage.html" class="text-slate-900">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
        </a>
        <h1 class="text-xl md:text-2xl font-extrabold text-slate-900">Billing History</h1>
    </div>
    <div id="billCount" class="text-slate-400 font-bold text-[10px] uppercase tracking-widest bg-slate-50 px-3 py-1 rounded-full">0 Records</div>
  </header>

  <div class="px-6 md:px-0 py-2 flex items-center gap-2 overflow-x-auto no-scrollbar mb-4">
    <button onclick="clearFilters(this)" class="filter-chip active bg-white text-slate-500 px-5 py-2 rounded-2xl text-xs font-bold whitespace-nowrap">All History</button>
    <button onclick="applyFilter('today', this)" class="filter-chip bg-white text-slate-500 px-5 py-2 rounded-2xl text-xs font-bold whitespace-nowrap">Today</button>
    <button onclick="applyFilter('yesterday', this)" class="filter-chip bg-white text-slate-500 px-5 py-2 rounded-2xl text-xs font-bold whitespace-nowrap">Yesterday</button>
    <div class="relative min-w-[140px]">
        <input type="date" id="customDate" onchange="applyFilter('custom', null)" 
               class="w-full bg-slate-50 border-none rounded-2xl px-4 py-2 text-xs font-bold text-slate-600 focus:ring-2 focus:ring-red-500 outline-none">
    </div>
  </div>

  <div class="px-6 md:px-0 mb-6">
    <div class="relative max-w-md">
      <span class="absolute inset-y-0 left-4 flex items-center text-slate-300">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
      </span>
      <input id="searchBills" type="text" placeholder="Quick search..." oninput="searchData()" 
             class="w-full p-4 pl-12 rounded-2xl bg-slate-50 border border-slate-100 outline-none focus:ring-2 focus:ring-red-500/20 text-slate-600 font-medium">
    </div>
  </div>

  <div id="mobileListView" class="md:hidden divide-y divide-slate-50"></div>

  <div class="hidden md:block overflow-hidden border border-slate-100 rounded-3xl shadow-sm">
    <table class="w-full text-left">
      <thead class="bg-slate-50 text-slate-400 text-[10px] font-black uppercase tracking-widest">
        <tr>
          <th class="px-8 py-5">Source</th>
          <th class="px-8 py-5">ID</th>
          <th class="px-8 py-5">Customer</th>
          <th class="px-8 py-5">Date</th>
          <th class="px-8 py-5 text-right">Amount</th>
        </tr>
      </thead>
      <tbody id="laptopTableBody" class="divide-y divide-slate-50"></tbody>
    </table>
  </div>
</div>

<script>
let allBills = [];
let displayedBills = [];
const fmt = (n) => parseFloat(n || 0).toLocaleString('en-IN', { minimumFractionDigits: 2 });

async function loadData() {
  try {
    const res = await fetch('/api/bills'); 
    allBills = await res.json();
    // Sort by most recent
    allBills.sort((a,b) => new Date(b.date) - new Date(a.date));
    displayedBills = [...allBills]; // On load, show everything
    render(displayedBills);
  } catch(e) { console.error(e); }
}

function render(data) {
  const mobileCont = document.getElementById('mobileListView');
  const laptopCont = document.getElementById('laptopTableBody');
  document.getElementById('billCount').textContent = `${data.length} Records`;
  
  mobileCont.innerHTML = '';
  laptopCont.innerHTML = '';

  let currentGroup = "";

  data.forEach(b => {
    const dObj = new Date(b.date);
    const dateStr = dObj.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
    const timeStr = dObj.toLocaleTimeString('en-IN', { hour: 'numeric', minute: '2-digit', hour12: true }).toLowerCase();
    const groupHeader = formatGroupHeader(b.date);
    const isZomato = (b.customer || "").toLowerCase().includes("zomato");
    const sourceIcon = isZomato ? "https://upload.wikimedia.org/wikipedia/commons/7/75/Zomato_logo.png" : "https://cdn-icons-png.flaticon.com/512/1144/1144760.png";

    // Mobile Grouping
    if (groupHeader !== currentGroup) {
        currentGroup = groupHeader;
        mobileCont.innerHTML += `<div class="date-separator">${groupHeader}</div>`;
    }

    mobileCont.innerHTML += `
      <div onclick="window.location.href='viewdetailedbill.html?id=${b.id}'" class="flex items-center justify-between p-5 bg-white active:bg-slate-50">
        <div class="flex items-center gap-4">
          <div class="w-12 h-12 rounded-2xl bg-slate-50 flex items-center justify-center border border-slate-100 p-2">
            <img src="${sourceIcon}" class="w-full h-full object-contain opacity-80">
          </div>
          <div>
            <div class="font-extrabold text-slate-900 text-sm leading-tight uppercase">${b.customer || 'Walk-in'}</div>
            <div class="text-[10px] text-slate-400 font-bold uppercase tracking-tight">#${b.id}</div>
          </div>
        </div>
        <div class="text-right">
          <div class="font-black text-red-600 text-sm">₹${fmt(b.total)}</div>
          <div class="text-[10px] text-slate-400 font-bold uppercase tracking-tighter">${timeStr}</div>
        </div>
      </div>`;

    laptopCont.innerHTML += `
      <tr class="hover:bg-slate-50 cursor-pointer transition" onclick="window.location.href='viewdetailedbill.html?id=${b.id}'">
        <td class="px-8 py-5 text-[10px] font-bold text-slate-400 uppercase tracking-widest">${isZomato ? '🛵 Zomato' : '👤 Direct'}</td>
        <td class="px-8 py-5 font-black text-red-600 text-xs">#${b.id}</td>
        <td class="px-8 py-5 font-bold text-slate-900 uppercase text-sm">${b.customer || 'Walk-in'}</td>
        <td class="px-8 py-5 text-slate-500 text-xs font-semibold">${dateStr} <span class="text-slate-300 ml-1">${timeStr}</span></td>
        <td class="px-8 py-5 text-right font-black text-slate-900 text-base">₹${fmt(b.total)}</td>
      </tr>`;
  });
}

function formatGroupHeader(dateString) {
    const d = new Date(dateString);
    const today = new Date();
    const yesterday = new Date();
    yesterday.setDate(today.getDate() - 1);
    if (d.toDateString() === today.toDateString()) return "TODAY";
    if (d.toDateString() === yesterday.toDateString()) return "YESTERDAY";
    return d.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' }).toUpperCase();
}

function applyFilter(type, btn) {
    if (btn) {
        document.querySelectorAll('.filter-chip').forEach(b => b.classList.remove('active', 'bg-white', 'text-slate-500'));
        document.querySelectorAll('.filter-chip').forEach(b => b.classList.add('bg-white', 'text-slate-500'));
        btn.classList.add('active');
        btn.classList.remove('bg-white', 'text-slate-500');
    }

    const targetDate = new Date();
    if (type === 'yesterday') targetDate.setDate(targetDate.getDate() - 1);
    
    if (type === 'custom') {
        const val = document.getElementById('customDate').value;
        if (!val) return;
        const custom = new Date(val).toDateString();
        displayedBills = allBills.filter(b => new Date(b.date).toDateString() === custom);
        document.querySelectorAll('.filter-chip').forEach(b => b.classList.remove('active'));
    } else {
        const targetStr = targetDate.toDateString();
        displayedBills = allBills.filter(b => new Date(b.date).toDateString() === targetStr);
    }
    render(displayedBills);
}

function clearFilters(btn) {
    document.querySelectorAll('.filter-chip').forEach(b => b.classList.remove('active', 'bg-white', 'text-slate-500'));
    document.querySelectorAll('.filter-chip').forEach(b => b.classList.add('bg-white', 'text-slate-500'));
    btn.classList.add('active');
    btn.classList.remove('bg-white', 'text-slate-500');
    document.getElementById('customDate').value = "";
    displayedBills = [...allBills];
    render(displayedBills);
}

function searchData() {
    const q = document.getElementById('searchBills').value.toLowerCase();
    const filtered = displayedBills.filter(b => 
        String(b.id).includes(q) || 
        (b.customer || "").toLowerCase().includes(q)
    );
    render(filtered);
}

window.addEventListener('DOMContentLoaded', loadData);
</script>
</body>
</html>
